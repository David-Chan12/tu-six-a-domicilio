<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>=Tu Six a Domicilio - Panel Administrativo Profesional=</title>
  
  <link href="https://fonts.googleapis.com/css?family=PT+Sans:400,700|Merriweather:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
* {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rojo-six: #fb0101;
      --rojo-gradiente: #d40202;
      --fondo-admin: #f4f7fe; /* Fondo moderno azul claro */
      --blanco: #ffffff;
      --texto-principal: #2b3674;
      --texto-secundario: #a3aed1;
      --sombra-suave: 0px 18px 40px rgba(112, 144, 176, 0.12);
      --radio-borde: 20px;
    }

    body {
      font-family: 'PT Sans', sans-serif;
      background: var(--fondo-admin);
      color: var(--texto-principal);
      display: flex;
    }

    /* SIDEBAR MODERNO */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #111c44 0%, #0b1437 100%);
      color: white;
      min-height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      transition: all 0.3s;
      z-index: 100;
      box-shadow: 4px 0 20px rgba(0,0,0,0.1);
    }

    .sidebar-header {
      padding: 30px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar-header h2 {
      font-size: 32px;
      color: var(--rojo-six);
      letter-spacing: 1px;
    }

    .admin-info {
      padding: 20px;
      background: rgba(255,255,255,0.03);
      margin: 20px 15px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .admin-info i {
      font-size: 40px;
      margin-bottom: 10px;
      color: var(--rojo-six);
    }

    .nav-menu { list-style: none; margin-top: 10px; }

    .nav-menu li {
      padding: 15px 25px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: bold;
      color: var(--texto-secundario);
      border-right: 4px solid transparent;
    }

    .nav-menu li:hover {
      color: white;
      background: rgba(255,255,255,0.05);
    }

    .nav-menu li.active {
      color: white;
      border-right: 4px solid var(--rojo-six);
      background: linear-gradient(90deg, rgba(251,1,1,0) 0%, rgba(251,1,1,0.1) 100%);
    }

    .logout-btn {
      position: absolute;
      bottom: 30px;
      width: calc(100% - 40px);
      margin: 0 20px;
      background: rgba(251,1,1,0.1);
      border: 1px solid rgba(251,1,1,0.2);
      color: var(--rojo-six);
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: var(--rojo-six);
      color: white;
    }

    /* MAIN CONTENT Y TARJETAS */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 30px 40px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .page-title {
      font-size: 34px;
      font-weight: bold;
    }

    .stat-card, .chart-container, .section-card, .login-card {
      background: var(--blanco);
      border-radius: var(--radio-borde);
      box-shadow: var(--sombra-suave);
      padding: 25px;
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      margin-bottom: 35px;
    }

    .stat-info h3 {
      font-size: 14px;
      color: var(--texto-secundario);
      margin-bottom: 5px;
    }

    .stat-info .number { font-size: 32px; font-weight: bold; }

    .stat-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    /* TABLAS MODERNAS */
    .section-card { margin-bottom: 30px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    
    th {
      color: var(--texto-secundario);
      font-size: 14px;
      padding: 15px 10px;
      text-transform: uppercase;
      border-bottom: 1px solid #e9edf7;
    }
    
    td {
      padding: 18px 10px;
      font-weight: bold;
      border-bottom: 1px solid #e9edf7;
    }

    tr:hover td { background-color: #f8fafc; }

    /* BOTONES */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--rojo-six), var(--rojo-gradiente));
      color: white;
      box-shadow: 0 4px 10px rgba(251,1,1,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(251,1,1,0.3); }

    /* ESTILOS DE SELECT (Como el index) */
    select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-weight: bold;
      color: var(--texto-principal);
      outline: none;
    }

    @media (max-width: 768px) {
      .sidebar { width: 80px; }
      .sidebar-header h2, .sidebar-header p, .admin-info h4, .admin-info p, .nav-menu li span { display: none; }
      .main-content { margin-left: 80px; padding: 20px; }
    }
    /* =========================================
       RESTAURACIÓN DE GRÁFICAS, ETIQUETAS Y RANKINGS
       ========================================= */

    /* 1. Límite estricto para que las gráficas no se vuelvan gigantes */
    canvas {
      max-height: 300px !important;
      width: 100% !important;
      margin-top: 20px;
    }

    /* 2. Estilos para las etiquetas de estado en la tabla */
    .estado-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
      text-align: center;
    }
    .estado-pendiente { background: #fff3cd; color: #856404; }
    .estado-preparacion { background: #ffe5d0; color: #fd7e14; }
    .estado-camino { background: #d1ecf1; color: #0c5460; }
    .estado-entregado { background: #d4edda; color: #155724; }

    /* 3. Estilos para que el Top 5 se vea ordenado y en fila */
    .rank-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e9edf7;
    }
    .rank-item:last-child {
      border-bottom: none; /* Quita la línea del último elemento */
    }
    .rank-number {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--rojo-six), var(--rojo-gradiente));
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(251,1,1,0.3);
    }
    .rank-name {
      flex: 1;
      margin-left: 15px;
      font-weight: bold;
      color: var(--texto-principal);
    }
    .rank-value {
      font-weight: bold;
      color: var(--rojo-six);
      font-size: 14px;
    }
    /* =========================================
       CORRECCIÓN: ESPACIADOS Y DISEÑO DE LOGIN
       ========================================= */

    /* 1. Separación de los Dashboards (Para que respiren) */
    .charts-row {
      gap: 35px !important; /* Más espacio entre gráficas que están lado a lado */
      margin-bottom: 40px !important; /* Más espacio hacia la fila de abajo */
    }
    
    .section-card, .chart-container {
      margin-bottom: 40px !important; /* Evita que las tablas y gráficas colisionen verticalmente */
    }

    /* 2. Rediseño Premium del Inicio de Sesión */
    .login-container {
      min-height: 100vh; /* Centra la tarjeta perfectamente en la pantalla */
      background: var(--fondo-admin); 
      margin: -20px; /* Ajuste para quitar márgenes extra */
    }

    .login-card {
      padding: 50px 40px !important;
      border-radius: 24px !important;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08) !important;
      text-align: center;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .login-card h2 {
      font-size: 30px;
      color: var(--texto-principal);
      margin-bottom: 5px;
      font-family: 'PT Sans', sans-serif;
    }

    .login-card p {
      color: var(--texto-secundario) !important;
      margin-bottom: 30px !important;
      font-size: 16px;
    }

    .login-card input {
      width: 100%;
      padding: 16px 20px !important;
      margin-bottom: 20px !important;
      border: 2px solid #e9edf7 !important;
      border-radius: 12px !important;
      font-family: 'PT Sans', sans-serif;
      font-size: 16px;
      color: var(--texto-principal);
      background-color: #f8fafc;
      transition: all 0.3s ease;
      box-sizing: border-box; /* Evita que el input se salga de la tarjeta */
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--rojo-six) !important;
      box-shadow: 0 0 0 4px rgba(251, 1, 1, 0.1) !important;
      background-color: var(--blanco);
    }

    .login-card hr {
      border: 0;
      height: 1px;
      background: #e9edf7;
      margin: 30px 0 !important;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>TU SIX</h2>
    <p>a domicilio</p>
  </div>
  
  <div class="admin-info" id="adminInfo">
    <i class="fas fa-user-shield"></i>
    <h4>Administrador</h4>
    <p id="adminEmail">No autenticado</p>

  <ul class="nav-menu" id="navMenu">

<div class="main-content" id="mainContent">
  <div id="loginContainer" class="login-container">
    <div class="login-card">
      <h2>Panel Administrativo</h2>
      <p style="text-align: center; margin-bottom: 20px;">Inicia sesión para continuar</p>
      <div id="loginError" class="alert alert-danger" style="display: none;"></div>
      <input type="email" id="loginEmail" placeholder="correo admin">
      <input type="password" id="loginPassword" placeholder="Contraseña">
      <button onclick="loginAdmin()" class="btn btn-primary" style="width: 100%;">Ingresar</button>
      <hr style="margin: 20px 0;">
      <p style="text-align: center; font-size: 12px; color: #666;">
        <i class="fas fa-info-circle"></i> Credenciales: admin/admin
      </p>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAnP6eK_WXlhN9Adqpf-ryVRTY58l3PbjQ",
  authDomain: "link-six.firebaseapp.com",
  projectId: "link-six",
  storageBucket: "link-six.firebasestorage.app",
  messagingSenderId: "92853854893",
  appId: "1:92853854893:web:bdf39a4ee799ea4bbf9c24"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Administradores autorizados
const ADMIN_EMAILS = ["admin@six.com"];

let pedidosData = [];
let productosData = [];
let clientesMap = new Map();
let charts = {};

// ========== FUNCIONES DE AUTENTICACIÓN ==========
// ========== FUNCIONES CON SWEETALERT2 ==========

async function loginAdmin() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  
  if (!email || !password) {
    return Swal.fire('Faltan datos', 'Ingresa email y contraseña', 'warning');
  }
  
  try {
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    if (!ADMIN_EMAILS.includes(userCredential.user.email)) {
      await auth.signOut();
      return Swal.fire('Acceso denegado', 'No tienes permisos de administrador.', 'error');
    }
    
    document.getElementById("adminEmail").innerText = userCredential.user.email;
    document.getElementById("loginContainer").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    await cargarDatos();
    mostrarDashboard();
    
    Swal.fire({
      title: '¡Bienvenido Administrador!',
      text: 'Panel cargado correctamente',
      icon: 'success',
      timer: 1500,
      showConfirmButton: false
    });
    
  } catch (error) {
    Swal.fire('Error', 'Credenciales incorrectas', 'error');
  }
}

window.actualizarEstado = async function(id, nuevoEstado) {
  await db.collection("pedidos").doc(id).update({ estado: nuevoEstado });
  await cargarPedidos();
  mostrarVentas();
  
  Swal.fire({
    toast: true,
    position: 'top-end',
    icon: 'success',
    title: `Pedido #${id.slice(-5)} actualizado a ${nuevoEstado}`,
    showConfirmButton: false,
    timer: 3000
  });
};

window.agregarProducto = async function() {
  const { value: formValues } = await Swal.fire({
    title: 'Agregar Nuevo Producto',
    html:
      '<input id="swal-nombre" class="swal2-input" placeholder="Nombre del producto">' +
      '<input id="swal-precio" type="number" class="swal2-input" placeholder="Precio ($)">' +
      '<input id="swal-stock" type="number" class="swal2-input" placeholder="Stock inicial">' +
      '<input id="swal-categoria" class="swal2-input" placeholder="Categoría (ej. Cervezas, Botanas)">',
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'Guardar Producto',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#fb0101',
    preConfirm: () => {
      const nombre = document.getElementById('swal-nombre').value;
      const precio = document.getElementById('swal-precio').value;
      if (!nombre || !precio) {
        Swal.showValidationMessage('El nombre y el precio son obligatorios');
      }
      return {
        nombre: nombre,
        precio: parseFloat(precio),
        stock: parseInt(document.getElementById('swal-stock').value) || 0,
        categoria: document.getElementById('swal-categoria').value || 'Otros'
      }
    }
  });

  if (formValues) {
    await db.collection("productos").add({ ...formValues, vendidos: 0 });
    await cargarProductos();
    mostrarProductos();
    Swal.fire('¡Agregado!', 'El producto ya está en el catálogo.', 'success');
  }
};

window.editarProducto = async function(id) {
  // Buscamos los datos actuales del producto para rellenar las cajitas
  const producto = productosData.find(p => p.id === id);
  
  const { value: formValues } = await Swal.fire({
    title: 'Editar Producto',
    html:
      `<label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Nombre:</label>` +
      `<input id="swal-edit-nombre" class="swal2-input" placeholder="Nombre" value="${producto.nombre}">` +
      `<label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Precio ($):</label>` +
      `<input id="swal-edit-precio" type="number" class="swal2-input" placeholder="Precio" value="${producto.precio}">` +
      `<label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Stock:</label>` +
      `<input id="swal-edit-stock" type="number" class="swal2-input" placeholder="Stock" value="${producto.stock || 0}">` +
      `<label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Categoría:</label>` +
      `<input id="swal-edit-categoria" class="swal2-input" placeholder="Categoría" value="${producto.categoria || ''}">`,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'Actualizar',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#fb0101',
    preConfirm: () => {
      const nombre = document.getElementById('swal-edit-nombre').value;
      const precio = document.getElementById('swal-edit-precio').value;
      if (!nombre || !precio) Swal.showValidationMessage('El nombre y el precio son obligatorios');
      return {
        nombre: nombre,
        precio: parseFloat(precio),
        stock: parseInt(document.getElementById('swal-edit-stock').value) || 0,
        categoria: document.getElementById('swal-edit-categoria').value || 'Otros'
      }
    }
  });

  if (formValues) {
    await db.collection("productos").doc(id).update(formValues);
    await cargarProductos();
    mostrarProductos();
    Swal.fire('¡Actualizado!', 'El producto ha sido modificado exitosamente.', 'success');
  }
};

window.eliminarProducto = async function(id) {
  const confirmacion = await Swal.fire({
    title: '¿Estás seguro?',
    text: "El producto será eliminado permanentemente del catálogo.",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#fb0101',
    cancelButtonColor: '#6c757d',
    confirmButtonText: 'Sí, eliminar',
    cancelButtonText: 'Cancelar'
  });

  if (confirmacion.isConfirmed) {
    await db.collection("productos").doc(id).delete();
    await cargarProductos();
    mostrarProductos();
    Swal.fire('Eliminado', 'El producto ha sido borrado.', 'success');
  }
};
  // Función para cerrar sesión en el Admin
function logout() {
  Swal.fire({
    title: '¿Cerrar sesión?',
    text: "Saldrás del panel de administración.",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#fb0101',
    confirmButtonText: 'Sí, salir'
  }).then((result) => {
    if (result.isConfirmed) {
      auth.signOut().then(() => {
        // --- AQUÍ ESTÁ LA MAGIA DE LIMPIEZA ---
        document.getElementById("loginEmail").value = "";     // Borra el correo
        document.getElementById("loginPassword").value = "";  // Borra la contraseña
        document.getElementById("adminEmail").innerText = ""; // Limpia el nombre
        
        document.getElementById("loginContainer").style.display = "flex";
        document.getElementById("appContent").style.display = "none";
        
        Swal.fire({
          title: 'Sesión cerrada',
          icon: 'success',
          timer: 1500,
          showConfirmButton: false
        });
        
      }).catch((error) => {
        Swal.fire('Error', 'No se pudo cerrar sesión: ' + error.message, 'error');
      });
    }
  });
}

// ========== CARGA DE DATOS ==========
async function cargarDatos() {
  await cargarPedidos();
  await cargarProductos();
  await cargarClientes();
}

async function cargarPedidos() {
  const snapshot = await db.collection("pedidos").orderBy("fechaTimestamp", "desc").get();
  pedidosData = [];
  snapshot.forEach(doc => {
    pedidosData.push({ id: doc.id, ...doc.data() });
  });
}

async function cargarProductos() {
  const snapshot = await db.collection("productos").get();
  productosData = [];
  snapshot.forEach(doc => {
    productosData.push({ id: doc.id, ...doc.data() });
  });
  
  if (productosData.length === 0) {
    const productosEjemplo = [
      { nombre: "Cerveza Corona", precio: 25, stock: 100, vendidos: 32, categoria: "Cervezas" },
      { nombre: "Cerveza Modelo", precio: 28, stock: 90, vendidos: 28, categoria: "Cervezas" },
      { nombre: "Coca Cola 600ml", precio: 18, stock: 80, vendidos: 25, categoria: "Refrescos" },
      { nombre: "Sabritas Original", precio: 15, stock: 120, vendidos: 18, categoria: "Botanas" },
      { nombre: "Hielo 5kg", precio: 30, stock: 50, vendidos: 15, categoria: "Hielo" },
      { nombre: "Cheetos", precio: 15, stock: 70, vendidos: 12, categoria: "Botanas" },
      { nombre: "Doritos", precio: 16, stock: 65, vendidos: 10, categoria: "Botanas" },
      { nombre: "Cerveza Tecate", precio: 22, stock: 85, vendidos: 20, categoria: "Cervezas" }
    ];
    for (const p of productosEjemplo) {
      await db.collection("productos").add(p);
    }
    await cargarProductos();
  }
}

async function cargarClientes() {
  const emailsUnicos = [...new Set(pedidosData.map(p => p.email).filter(e => e))];
  clientesMap.clear();
  for (const email of emailsUnicos) {
    const pedidosCliente = pedidosData.filter(p => p.email === email);
    clientesMap.set(email, {
      email,
      totalPedidos: pedidosCliente.length,
      totalGastado: pedidosCliente.reduce((sum, p) => sum + (p.total || 0), 0),
      ultimoPedido: pedidosCliente[0]?.fecha || 'N/A'
    });
  }
}


// ========== UTILIDADES DE PRODUCTOS ==========
function obtenerProductosTexto(productos) {
  if (Array.isArray(productos)) {
    return productos.map(prod => `${prod.nombre || 'Producto'}${prod.amount ? ` (x${prod.amount})` : ''}`).join(', ');
  }
  if (typeof productos === 'string') {
    return productos;
  }
  return 'Sin productos';
}

function obtenerProductosArray(productos) {
  if (Array.isArray(productos)) {
    return productos;
  }
  if (typeof productos === 'string') {
    return productos.split(',').map(prod => ({
      nombre: prod.trim(),
      amount: 1

// ========== SECCIÓN VENTAS ==========
function mostrarVentas() {
  // Ventas por día (últimos 7 días)
  const ventasPorDia = {};
  for (let i = 6; i >= 0; i--) {
    const fecha = new Date();
    fecha.setDate(fecha.getDate() - i);
    const key = fecha.toLocaleDateString();
    ventasPorDia[key] = 0;
  }
  
  pedidosData.forEach(p => {
    if (p.fecha && p.total) {
      const fechaPedido = p.fecha.split(',')[0];
      if (ventasPorDia[fechaPedido] !== undefined) {
        ventasPorDia[fechaPedido] += p.total;
      }
    }
  });
  
  // Pedidos por hora
  const pedidosPorHora = Array(24).fill(0);

  const totalSemanal = Object.values(ventasPorDia).reduce((a, b) => a + b, 0);

      <table>
        <thead><tr><th>Email</th><th>Total Pedidos</th><th>Total Gastado</th><th>Último Pedido</th></tr></thead>
        <tbody>
          ${clientesArray.map(c => `
            <tr>
              <td>${c.email}</td>
              <td>${c.totalPedidos}</td>
              <td>$${c.totalGastado.toLocaleString()}</td>
              <td>${c.ultimoPedido?.split(',')[0] || 'N/A'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  
  document.getElementById("appContent").innerHTML = html;
  
  setTimeout(() => {
    const ctxHist = document.getElementById('historialChart')?.getContext('2d');
    if (ctxHist) {
      const ultimos6Meses = [];
      const ventasMensuales = [0, 0, 0, 0, 0, 0];
      const fechaActual = new Date();
      
      // 1. Crear las etiquetas de los últimos 6 meses reales
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setMonth(fechaActual.getMonth() - i);
        ultimos6Meses.push(d.toLocaleString('es', { month: 'short' }));
      }

      // 2. Sumar las ventas reales de Firebase
      pedidosData.forEach(p => {
        if (p.fecha) {
          // Extraemos el mes y el año del texto de la fecha (ej. "28/5/2026")
          const fechaString = p.fecha.split(',')[0]; 
          const partes = fechaString.split('/');
          
          if (partes.length === 3) {
            const mesPedido = parseInt(partes[1]) - 1; // Enero es 0 en JS
            const añoPedido = parseInt(partes[2]);

            // Comprobamos a cuál de los últimos 6 meses pertenece la venta y sumamos el total
            for (let i = 0; i < 6; i++) {
              const d = new Date();
              d.setMonth(fechaActual.getMonth() - (5 - i));
              
              if (d.getMonth() === mesPedido && d.getFullYear() === añoPedido) {
                ventasMensuales[i] += (p.total || 0);
              }
            }
          }
        }
      });
      
      if (charts.historial) charts.historial.destroy();
      charts.historial = new Chart(ctxHist, {
        type: 'bar',
        data: {
          labels: ultimos6Meses,
          datasets: [{ label: 'Ventas ($)', data: ventasMensuales, backgroundColor: '#fb0101', borderRadius: 8 }]
        },
        options: { responsive: true, maintainAspectRatio: true }
      });
    }
  }, 100);
}

function mostrarReportes() {
  // Horas pico
  const pedidosPorHora = Array(24).fill(0);
  pedidosData.forEach(p => {
    if (p.fecha) {
      const hora = parseInt(p.fecha.split(' ')[1]?.split(':')[0] || 0);
      if (!isNaN(hora)) pedidosPorHora[hora]++;
    }
  });
  
  const horaPico = pedidosPorHora.indexOf(Math.max(...pedidosPorHora));
  
  // Tiempos de entrega (simulados)
  const entregados = pedidosData.filter(p => p.estado === 'Entregado');

      </div>
      <div class="stat-card">
        <div class="stat-info"><h3>Tasa de Entregas</h3><div class="number">${Math.round((entregados.length / (pedidosData.length || 1)) * 100)}%</div></div>
        <div class="stat-icon" style="background:#e5e5ff;"><i class="fas fa-chart-pie"></i></div>
      </div>
    </div>
    
    <div class="charts-row">
      <div class="chart-container">
        <h4>⏰ Pedidos por hora (Horario pico)</h4>
        <canvas id="horasPicoChart"></canvas>
      </div>
      <div class="chart-container">
        <h4>📊 Ventas por día de la semana</h4>
        <canvas id="diaSemanaChart"></canvas>
      </div>
    </div>
    
    <div class="charts-row">
      <div class="chart-container">
        <h4>🚚 Estado de pedidos</h4>
        <canvas id="estadosGeneralChart"></canvas>
      </div>
      <div class="chart-container">
        <h4>📈 Resumen ejecutivo</h4>
        <div style="padding: 20px;">
          <div class="rank-item"><strong>Total de pedidos:</strong> <span>${pedidosData.length}</span></div>
          <div class="rank-item"><strong>Ingresos totales:</strong> <span>$${pedidosData.reduce((sum, p) => sum + (p.total || 0), 0).toLocaleString()}</span></div>
          <div class="rank-item"><strong>Clientes únicos:</strong> <span>${clientesMap.size}</span></div>
          <div class="rank-item"><strong>Ticket promedio:</strong> <span>$${Math.round(pedidosData.reduce((sum, p) => sum + (p.total || 0), 0) / (pedidosData.length || 1))}</span></div>
          <div class="rank-item"><strong>Productos más vendido:</strong> <span>Cerveza Corona</span></div>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById("appContent").innerHTML = html;
  
  setTimeout(() => {
    const ctxHoras = document.getElementById('horasPicoChart')?.getContext('2d');
    if (ctxHoras) {
      if (charts.horasPico) charts.horasPico.destroy();
      charts.horasPico = new Chart(ctxHoras, {
        type: 'bar',

window.agregarProducto = async function() {
  // 1. Extraemos las categorías que ya existen para hacer el menú
  const categorias = [...new Set(productosData.map(p => p.categoria || 'General'))];
  let opcionesCategorias = categorias.map(c => `<option value="${c}">${c}</option>`).join('');
  opcionesCategorias += `<option value="NUEVA" style="font-weight:bold; color:var(--rojo-six);">+ Crear nueva categoría...</option>`;

  const { value: formValues } = await Swal.fire({
    title: 'Agregar Nuevo Producto',
    html: `
      <input id="swal-nombre" class="swal2-input" placeholder="Nombre del producto">
      <input id="swal-precio" type="number" class="swal2-input" placeholder="Precio ($)">
      <input id="swal-stock" type="number" class="swal2-input" placeholder="Stock inicial">
      
      <label style="text-align: left; display: block; font-size: 14px; margin-top: 15px;">Selecciona o crea categoría:</label>
      <select id="swal-categoria" class="swal2-input" onchange="if(this.value==='NUEVA'){document.getElementById('swal-nueva-cat').style.display='block'}else{document.getElementById('swal-nueva-cat').style.display='none'}">
        <option value="" disabled selected>Elige una categoría...</option>
        ${opcionesCategorias}
      </select>
      <input id="swal-nueva-cat" class="swal2-input" placeholder="Escribe la nueva categoría" style="display:none; margin-top:10px;">
      
      <label style="display:block; text-align:left; margin-top:15px; font-size:14px;">Sube la imagen real del producto:</label>
      <input id="swal-imagen" type="file" class="swal2-file" accept="image/*" style="width: 100%; margin-top: 5px;">
    `,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'Guardar Producto',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#fb0101',
    preConfirm: () => {
      // Usamos una Promesa porque leer la imagen de la computadora toma unos milisegundos
      return new Promise((resolve) => {
        const nombre = document.getElementById('swal-nombre').value;
        const precio = document.getElementById('swal-precio').value;
        const stock = document.getElementById('swal-stock').value;
        let categoria = document.getElementById('swal-categoria').value;
        
        if (categoria === 'NUEVA') categoria = document.getElementById('swal-nueva-cat').value;
        
        if (!nombre || !precio || !categoria) {
          Swal.showValidationMessage('Nombre, precio y categoría son obligatorios');
          resolve(false);
          return;
        }

        const archivoInput = document.getElementById('swal-imagen');
        let imagenBase64 = "https://cdn-icons-png.flaticon.com/512/1046/1046784.png"; // Imagen por defecto (hamburguesa)

        // Si el usuario subió una foto, la convertimos a código para guardarla
        if (archivoInput.files.length > 0) {
          const reader = new FileReader();
          reader.onload = function(e) {
            resolve({
              nombre, 
              precio: parseFloat(precio), 
              stock: parseInt(stock) || 0, 
              categoria,
              imagen: e.target.result // Foto real
            });
          };
          reader.readAsDataURL(archivoInput.files[0]);
        } else {
          // Si no subió foto, guardamos con la de defecto
          resolve({
            nombre, 
            precio: parseFloat(precio), 
            stock: parseInt(stock) || 0, 
            categoria,
            imagen: imagenBase64
          });
        }
      });
    }
  });

  if (formValues) {
    await db.collection("productos").add({ ...formValues, vendidos: 0 });
    await cargarProductos();
    mostrarProductos();
    Swal.fire('¡Agregado!', 'El producto ya está en el catálogo con su imagen.', 'success');
  }
};

window.editarProducto = async function(id) {
  const producto = productosData.find(p => p.id === id);
  const categorias = [...new Set(productosData.map(p => p.categoria || 'General'))];
  
  let opcionesCategorias = categorias.map(c => `<option value="${c}" ${c === producto.categoria ? 'selected' : ''}>${c}</option>`).join('');
  opcionesCategorias += `<option value="NUEVA" style="font-weight:bold; color:var(--rojo-six);">+ Crear nueva categoría...</option>`;

  const { value: formValues } = await Swal.fire({
    title: 'Editar Producto',
    html: `
      <label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Nombre:</label>
      <input id="swal-edit-nombre" class="swal2-input" placeholder="Nombre" value="${producto.nombre}">
      
      <label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Precio ($):</label>
      <input id="swal-edit-precio" type="number" class="swal2-input" placeholder="Precio" value="${producto.precio}">
      
      <label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Stock:</label>
      <input id="swal-edit-stock" type="number" class="swal2-input" placeholder="Stock" value="${producto.stock || 0}">
      
      <label style="text-align: left; display: block; font-size: 14px; margin-top: 10px;">Categoría:</label>
      <select id="swal-edit-categoria" class="swal2-input" onchange="if(this.value==='NUEVA'){document.getElementById('swal-edit-nueva-cat').style.display='block'}else{document.getElementById('swal-edit-nueva-cat').style.display='none'}">
        ${opcionesCategorias}
      </select>
      <input id="swal-edit-nueva-cat" class="swal2-input" placeholder="Escribe la nueva categoría" style="display:none; margin-top:10px;">
      
      <label style="display:block; text-align:left; margin-top:15px; font-size:14px;">Cambiar Imagen (Opcional):</label>
      <input id="swal-edit-imagen" type="file" class="swal2-file" accept="image/*" style="width: 100%; margin-top: 5px;">
    `,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'Actualizar',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#fb0101',
    preConfirm: () => {
      return new Promise((resolve) => {
        const nombre = document.getElementById('swal-edit-nombre').value;
        const precio = document.getElementById('swal-edit-precio').value;
        const stock = document.getElementById('swal-edit-stock').value;
        let categoria = document.getElementById('swal-edit-categoria').value;
        
        if(categoria === 'NUEVA') categoria = document.getElementById('swal-edit-nueva-cat').value;

        if (!nombre || !precio || !categoria) {
          Swal.showValidationMessage('El nombre, precio y categoría son obligatorios');
          resolve(false);
          return;
        }

        const archivoInput = document.getElementById('swal-edit-imagen');
        let datosActualizados = {
          nombre,
          precio: parseFloat(precio),
          stock: parseInt(stock) || 0,
          categoria
        };

        // Si el usuario eligió una foto nueva, la actualizamos
        if (archivoInput.files.length > 0) {
          const reader = new FileReader();
          reader.onload = function(e) {
            datosActualizados.imagen = e.target.result;
            resolve(datosActualizados);
          };
          reader.readAsDataURL(archivoInput.files[0]);
        } else {
          // Si no, dejamos la imagen que ya tenía
          resolve(datosActualizados);
        }
      });
    }
  });

  if (formValues) {
    await db.collection("productos").doc(id).update(formValues);
    await cargarProductos();
    mostrarProductos();
    Swal.fire('¡Actualizado!', 'El producto ha sido modificado exitosamente.', 'success');
  }
};

window.eliminarProducto = async function(id) {
  const confirmacion = await Swal.fire({
    title: '¿Estás seguro?',
    text: "El producto será eliminado permanentemente del catálogo.",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#fb0101',
    cancelButtonColor: '#6c757d',
    confirmButtonText: 'Sí, eliminar',
    cancelButtonText: 'Cancelar'
  });

  if (confirmacion.isConfirmed) {
    await db.collection("productos").doc(id).delete();
    await cargarProductos();
    mostrarProductos();
    Swal.fire('Eliminado', 'El producto ha sido borrado.', 'success');
  }
};

window.exportarReporte = function() {
  // 1. Recorremos los pedidos para darles formato seguro
  const csv = pedidosData.map(p => {
    
    // Convertimos la lista de objetos de productos a texto usando tu función
    const textoProductos = obtenerProductosTexto(p.productos);
    
    // Función de seguridad: Envuelve textos en comillas para proteger las comas
    const protegerTexto = (texto) => `"${(texto || '').toString().replace(/"/g, '""')}"`;
    
    // Retornamos la fila armada, protegiendo cliente, dirección, productos y fecha
    return `${p.id},${protegerTexto(p.cliente)},${protegerTexto(p.direccion)},${protegerTexto(textoProductos)},${p.total},${protegerTexto(p.estado)},${protegerTexto(p.fecha)}`;
  }).join("\n");
  
  // 2. Cabeceras del Excel
  const cabeceras = "ID,Cliente,Direccion,Productos,Total,Estado,Fecha\n";
  
  // 3. Agregamos el BOM (\uFEFF) para que Excel lea el UTF-8 (acentos y ñ) correctamente
  const blob = new Blob(["\uFEFF" + cabeceras + csv], { type: "text/csv;charset=utf-8;" });
  
  // 4. Descargamos el archivo
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `reporte_pedidos_${new Date().toISOString().slice(0,19)}.csv`;
  link.click();

};

window.exportarReporteCompleto = function() {
  // 1. Cabeceras con toda la información analítica separada
  const cabeceras = "ID_Pedido,Nombre_Cliente,Direccion_Entrega,Detalle_Productos,Total_Ingreso,Estado_Pedido,Fecha_Completa,Mes,Dia_Semana,Hora_Compra,Cantidad_Articulos,Ticket_Promedio\n";

  // 2. Función para proteger textos que tengan comas por dentro
  const protegerTexto = (texto) => `"${(texto || '').toString().replace(/"/g, '""')}"`;

  // 3. Procesamos todos los pedidos
  const csv = pedidosData.map(p => {
    // Convertimos los productos a texto legible
    const textoProductos = obtenerProductosTexto(p.productos);

    // Extraemos los datos analíticos (si existen en la base de datos)
    const mes = p.mes || "N/A";
    const dia = p.diaSemana || "N/A";
    const hora = p.hora !== undefined ? p.hora + ":00" : "N/A";
    const cantidadArticulos = p.cantidadProductos || 1;
    const ticketPromedio = Math.round((p.total || 0) / cantidadArticulos);

    // Retornamos la fila completa con las 12 columnas
    return `${p.id},${protegerTexto(p.cliente)},${protegerTexto(p.direccion)},${protegerTexto(textoProductos)},${p.total},${protegerTexto(p.estado)},${protegerTexto(p.fecha)},${mes},${dia},${protegerTexto(hora)},${cantidadArticulos},${ticketPromedio}`;
  }).join("\n");

  // 4. Mostramos una alerta bonita
  Swal.fire({
    title: 'Reporte Completo Generado',
    text: 'Tu Excel con todas las métricas analíticas se ha descargado.',
    icon: 'success',
    confirmButtonColor: '#fb0101'
  });

  // 5. Armamos el Excel usando \uFEFF para que los acentos salgan perfectos
  const blob = new Blob(["\uFEFF" + cabeceras + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  
  // Le ponemos un nombre profesional al archivo
  link.download = `Six_Reporte_Analitico_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
S
};

function cambiarSeccion(section) {
  document.querySelectorAll('.nav-menu li').forEach(li => li.classList.remove('active'));
  document.querySelector(`[data-section="${section}"]`).classList.add('active');
  
  const funciones = {
    dashboard: mostrarDashboard,
    ventas: mostrarVentas,
    productos: mostrarProductos,
    clientes: mostrarClientes,
    reportes: mostrarReportes
  };
  if (funciones[section]) funciones[section]();
}

// Event listeners
document.querySelectorAll('.nav-menu li').forEach(li => {
  li.addEventListener('click', () => {
    const section = li.getAttribute('data-section');
    if (section) cambiarSeccion(section);
  });
});
